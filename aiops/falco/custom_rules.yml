# Custom Falco rules for platform security (UC7)
# These rules are loaded in addition to default Falco rules.

- rule: Suspicious kubectl exec in production
  desc: Alert on kubectl exec into pods in production namespaces
  condition: >
    spawned_process and
    proc.name in (kubectl) and
    proc.args contains "exec" and
    container.label.environment = "production"
  output: >
    Suspicious kubectl exec in production (user=%user.name pod=%k8s.pod.name
    namespace=%k8s.ns.name args=%proc.args)
  priority: WARNING
  tags: [UC7, security, kubectl]

- rule: Write below /etc in container
  desc: Detect writes to /etc in containers (possible credential injection)
  condition: >
    open_write and
    container.id != host and
    fd.name startswith /etc and
    not proc.name in (cp, mv, dpkg, apt-get, sed, passwd)
  output: >
    File below /etc opened for writing (user=%user.name proc=%proc.name
    file=%fd.name container=%container.id image=%container.image.repository)
  priority: CRITICAL
  tags: [UC7, security, filesystem]

- rule: Outbound connection to suspicious IP
  desc: Detect unexpected outbound connections from ML serving pods
  condition: >
    outbound and
    container.label.app in (ml-serving-api, anomaly-detector) and
    not fd.sip.name in (prometheus, mlflow, qdrant, redis, postgresql)
  output: >
    Unexpected outbound connection from ML service
    (proc=%proc.name connection=%fd.name container=%container.id)
  priority: WARNING
  tags: [UC7, security, network]

- rule: Model artifact tampered
  desc: Detect modification to /models directory at runtime (potential supply chain attack)
  condition: >
    open_write and
    container.id != host and
    fd.name startswith /models and
    not proc.name in (mlflow, python, pip)
  output: >
    Model artifact written at runtime (file=%fd.name proc=%proc.name
    container=%container.id image=%container.image.repository)
  priority: CRITICAL
  tags: [UC7, UC9, security, mlops]

- rule: Container running as root
  desc: Alert when a container is running as UID 0 in non-whitelisted namespaces
  condition: >
    container and
    container.id != host and
    user.uid = 0 and
    not k8s.ns.name in (kube-system, cert-manager, kyverno)
  output: >
    Container running as root (image=%container.image.repository
    pod=%k8s.pod.name namespace=%k8s.ns.name)
  priority: WARNING
  tags: [UC7, security, privilege]
