name: "90 · E2E Integration — All 23 UC Eval Results Aggregation"

on:
  workflow_run:
    workflows:
      - "01 · Observability Stack (Prometheus + Grafana + Loki + Tempo + OTEL)"
      - "02 · Data Pipeline (DVC + Synthetic Data + Great Expectations)"
      - "03 · UC1 — Drift Detection + Auto-Retraining (Evidently + NannyML + Alibi)"
      - "04 · UC2 — Log Anomaly Detection (PyTorch LSTM + Qdrant)"
      - "05 · UC5 — Feature Store + Training-Serving Skew (Feast + GE + Evidently)"
      - "06 · UC3 — Alert Correlation & Fatigue Reduction (DBSCAN)"
      - "07 · UC4 — Predictive Autoscaling (Prophet + KEDA)"
      - "08 · UC6 — Agentic Self-Healing (Falco + n8n + OPA)"
      - "09 · UC8/UC23 — RAG Runbook Agent + Auto Post-Mortem (Qdrant + TinyLlama)"
      - "10 · UC9/UC22 — Experiment Tracking + Registry + Canary Serving + A/B Test"
      - "11 · UC10 — Cloud Cost Anomaly Detection + Attribution (IsolationForest)"
      - "13 · UC7 — Security Policy Enforcement (Trivy + Falco + Kyverno + OPA)"
      - "14 · UC15 — DORA Metrics Dashboard (4 Keys from GHA Events)"
      - "15 · UC21 — SLO / Error Budget Monitoring (Prometheus + Grafana)"
      - "18 · UC11 — Distributed Tracing + RCA (OTEL + Tempo)"
      - "19 · UC12 — GitOps Compliance Drift (Kyverno + OPA)"
      - "20 · UC13 — Data Pipeline Quality Gates (Great Expectations + Airflow)"
      - "21 · UC14 — Hyperparameter Optimization (Optuna + MLflow)"
      - "22 · UC16 — Intelligent Error Classification (sklearn + sentence-transformers)"
      - "23 · UC17 — Model Explainability + Audit (SHAP + MLflow)"
      - "24 · UC18 — Predictive Rate Limiting (Redis + sklearn)"
      - "25 · UC19 — Feature Monitoring (WhyLogs + WhyLabs opt-in)"
      - "26 · UC20 — Backstage Service Catalog Validation"
    types: [completed]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  aggregate-results:
    name: "Aggregate All Eval Results"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download all eval artifacts
        uses: actions/download-artifact@v4
        with:
          path: eval-results/
          merge-multiple: true
        continue-on-error: true

      - name: Aggregate all UC results
        run: |
          python3 - <<'PYEOF'
          import sys, json
          sys.path.insert(0, '.')
          from pathlib import Path
          from eval.scorer import aggregate_all_results
          from eval.metrics import THRESHOLDS

          eval_dir = Path("eval-results")
          eval_dir.mkdir(exist_ok=True)

          summary = aggregate_all_results(eval_dir)
          expected = {f"UC{i}" for i in range(1, 24)}
          found = set(summary["ucs"].keys())
          missing = sorted(expected - found)

          print("=" * 60)
          print("  PLATFORM EVAL SUMMARY — All 23 Use Cases")
          print("=" * 60)
          print(f"  Passed: {summary['passed']}/{summary['total']}")
          print(f"  Failed: {summary['failed']}/{summary['total']}")
          print()
          for uc, r in sorted(summary["ucs"].items()):
              status = "PASS" if r["passed"] else "FAIL"
              print(f"  {status}  {uc}  score={r['score']:.1f}  threshold={r['threshold']}")

          if missing:
              print(f"\n  Not yet evaluated ({len(missing)}): {', '.join(missing)}")
              print("  Run: bash scripts/run-all-workflows.sh  (or dispatch missing workflows manually)")

          Path("eval-results/summary.json").write_text(json.dumps({
              **summary,
              "expected_total": len(expected),
              "missing_ucs": missing,
          }, indent=2))

          if summary["total"] > 0:
              pass_rate = summary["passed"] / summary["total"]
              print(f"\n  Overall pass rate: {pass_rate:.0%}")
              if pass_rate < 1.0:
                  print(f"  WARNING: {summary['failed']} UC(s) failing")
                  # Exit 1 when any evaluated UC fails (not just when missing)
                  sys.exit(1)
          else:
              print("  No eval results found — run individual UC workflows first")
          PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: eval-summary
          path: eval-results/summary.json
          retention-days: 30
