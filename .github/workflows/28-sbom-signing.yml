name: "28 · SBOM Generation + Container Image Signing"

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "infra/docker-compose/**"
      - "requirements.txt"
      - "pyproject.toml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  sbom-and-sign:
    name: "SBOM + Cosign Image Signing"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write  # Required for OIDC-based keyless signing with Cosign

    steps:
      - uses: actions/checkout@v4

      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: latest

      - name: Install Grype (vulnerability scanner)
        uses: anchore/scan-action/download-grype@v3

      - name: Generate Python dependency SBOM (SPDX)
        run: |
          syft . --output spdx-json=sbom-python.spdx.json \
            --config - <<'EOF'
          anchore:
            package:
              cataloger:
                enabled: true
                scope: squashed
          EOF
          echo "SBOM generated: $(cat sbom-python.spdx.json | python3 -c 'import sys,json; d=json.load(sys.stdin); print(f\"{len(d.get(\"packages\",[])) } packages\")')"

      - name: Scan SBOM for known vulnerabilities
        run: |
          grype sbom:sbom-python.spdx.json \
            --fail-on critical \
            --output table \
            --quiet
        continue-on-error: true  # Report but don't block — track via security dashboard

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-sbom
          path: |
            sbom-python.spdx.json
          retention-days: 90

      - name: Upload SBOM to GitHub Dependency Graph
        uses: anchore/sbom-action@v0
        with:
          sbom-artifact-match: "sbom-*.spdx.json"
          artifact-name: platform-sbom-${{ github.sha }}.spdx.json

  trivy-image-scan:
    name: "Trivy Container Security Scan"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [anomaly-detector, drift-monitor, alert-correlator, self-healing, runbook-agent, cost-optimizer]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on ${{ matrix.service }} Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "services/${{ matrix.service }}"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"  # Don't fail build — report to Security tab
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
