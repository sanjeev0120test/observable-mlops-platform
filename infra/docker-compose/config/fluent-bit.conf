[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     warn
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/**/*.log
    multiline.parser  docker, cri
    Tag               kube.*
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

[FILTER]
    Name    kubernetes
    Match   kube.*
    Merge_Log On
    Keep_Log Off

[OUTPUT]
    Name          loki
    Match         *
    Host          loki
    Port          3100
    Labels        {job="fluentbit", container="$kubernetes['container_name']", namespace="$kubernetes['namespace_name']"}
    Remove_keys   kubernetes, stream
    Auto_Kubernetes_Labels On
    line_format   json
