---
# Production-hardened Deployment for the self-healing service.
# Security posture (defence-in-depth, aligns with aiops/policies/kyverno):
#   - runAsNonRoot + non-zero UID, no privilege escalation, all caps dropped
#   - read-only root filesystem with an explicit writable /tmp emptyDir
#   - seccomp RuntimeDefault
#   - CPU/memory requests+limits (scheduling + OOM safety)
#   - liveness/readiness/startup probes on /health
#   - topology spread + anti-affinity so replicas survive a node loss
apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing
  namespace: platform
  labels:
    app: self-healing
    app.kubernetes.io/name: self-healing
    app.kubernetes.io/part-of: observable-mlops-platform
    uc: UC6
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: self-healing
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: self-healing
        app.kubernetes.io/name: self-healing
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: self-healing
      containers:
        - name: self-healing
          image: ghcr.io/observable-mlops-platform/self-healing:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: OPA_URL
              value: "http://opa:8181"
            - name: SELF_HEALING_DRY_RUN
              value: "true"
            - name: OPA_MAX_RETRIES
              value: "3"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: self-healing
  namespace: platform
  labels:
    app: self-healing
spec:
  selector:
    app: self-healing
  ports:
    - name: http
      port: 8000
      targetPort: http
