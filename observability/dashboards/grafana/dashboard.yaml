apiVersion: 1

providers:
  - name: "Platform Dashboards"
    orgId: 1
    folder: "Observable MLOps Platform"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
