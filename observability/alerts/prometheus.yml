global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "platform-services"
    static_configs:
      - targets:
          - "anomaly-detector:8000"
          - "drift-monitor:8000"
          - "alert-correlator:8000"
          - "predictive-scaler:8000"
          - "self-healing:8000"
          - "runbook-agent:8000"
          - "cost-optimizer:8000"
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: "mlflow"
    static_configs:
      - targets: ["mlflow:5000"]
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    scrape_interval: 30s

  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]
    scrape_interval: 30s

remote_write:
  - url: "http://localhost:9090/api/v1/write"
    queue_config:
      max_samples_per_send: 10000
